<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>67</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ─── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:   #0e0e0e; --bg2: #161616; --bg3: #1e1e1e; --bg4: #272727;
  --tx:   #e8e8e8; --tx2: #7a7a7a; --tx3: #3f3f3f;
  --bd:   #252525; --bd2: #353535;
  --acc:  #ffffff;
  --ok:   #4caf72; --err: #c44444;
  --cbk:  #090909; --cfc: #191919;
  --cw: 62px; --ch: 88px; --r: 8px;
}
[data-theme=light]{
  --bg:#f0efeb;--bg2:#e8e7e3;--bg3:#deded9;--bg4:#d0cfc9;
  --tx:#111;--tx2:#555;--tx3:#aaa;
  --bd:#ccc;--bd2:#bbb;--cbk:#1a1a1a;--cfc:#fafafa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;}
button{font-family:inherit;}
#app{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative;}

/* SCREENS */
.scr{display:none;flex-direction:column;height:100%;align-items:center;justify-content:center;}
.scr.on{display:flex;}
#sgame{display:none;flex-direction:column;height:100%;}
#sgame.on{display:flex;}

/* THEME */
.tbtn{position:fixed;top:13px;right:13px;z-index:200;background:none;
  border:1px solid var(--bd2);color:var(--tx2);width:32px;height:32px;
  border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* ── LOBBY ────────────────────────────────────────────────────── */
.logo{font-size:100px;font-weight:100;letter-spacing:-7px;line-height:1;color:var(--acc);}
.logo-s{font-size:11px;letter-spacing:3.5px;color:var(--tx3);margin:4px 0 52px;}
.mbtn{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);
  padding:15px 56px;border-radius:var(--r);font-size:15px;cursor:pointer;letter-spacing:.4px;}
.mbtn:active{opacity:.6;}

/* ── CONNECTING ───────────────────────────────────────────────── */
.spin{width:26px;height:26px;border:2px solid var(--bd2);border-top-color:var(--tx2);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.clbl{font-size:12px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;}

/* ── ROOM ─────────────────────────────────────────────────────── */
#sroom{justify-content:flex-start;}
.rh{width:100%;padding:14px 20px 12px;border-bottom:1px solid var(--bd);text-align:center;}
.rh-lbl{font-size:10px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;}
.rh-id{font-size:19px;color:var(--tx2);font-weight:300;margin-top:2px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:18px;width:100%;}
.pslot{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:9px;padding:20px 12px;min-height:108px;transition:border-color .25s;}
.pslot.rdy{border-color:var(--ok);}
.pslot.emp{opacity:.3;}
.pav{width:38px;height:38px;background:var(--bg4);border-radius:4px;transition:background .25s;}
.pslot.rdy .pav{background:var(--ok);}
.pst{font-size:11px;color:var(--tx3);transition:color .25s;}
.pslot.rdy .pst{color:var(--ok);}
.rf{width:100%;padding:14px 18px;border-top:1px solid var(--bd);
  display:flex;flex-direction:column;gap:9px;margin-top:auto;}
.rbtn{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);
  padding:14px;border-radius:var(--r);font-size:15px;cursor:pointer;text-align:center;transition:all .2s;}
.rbtn.on{border-color:var(--ok);color:var(--ok);}
.rbtn:active{opacity:.6;}
.lleave{color:var(--tx3);font-size:12px;text-align:center;cursor:pointer;padding:6px;}

/* ── REVEAL ───────────────────────────────────────────────────── */
.rvlbl{font-size:10px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px;}
.rvwrap{perspective:700px;margin-bottom:32px;}
.rvcard{width:106px;height:148px;transform-style:preserve-3d;
  animation:flipc 1s cubic-bezier(.35,0,.2,1) forwards;animation-delay:.35s;}
@keyframes flipc{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
.rvface{position:absolute;inset:0;backface-visibility:hidden;border-radius:11px;}
.rvback{background:var(--cbk);border:1px solid var(--bd);}
.rvfront{background:var(--cfc);border:1px solid var(--bd2);transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
.rv-rk{font-size:32px;font-weight:200;color:var(--tx);}
.rv-su{font-size:44px;line-height:1;color:#fff;}
.rvdesc{font-size:14px;color:var(--tx2);text-align:center;max-width:240px;line-height:1.6;padding:0 20px;}
.rvbtn{background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);
  padding:13px 48px;border-radius:var(--r);font-size:14px;cursor:pointer;
  opacity:0;animation:fdin .3s forwards;animation-delay:1.6s;margin-top:20px;}
@keyframes fdin{to{opacity:1;}}
.rvbtn:active{opacity:.6;}

/* ── GAME TOP ─────────────────────────────────────────────────── */
.gtop{padding:7px 13px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bd);min-height:42px;flex-shrink:0;}
.gturn{font-size:12px;color:var(--tx3);}
.gturn b{color:var(--tx);font-weight:500;}
.gdir{font-size:20px;transition:transform .1s;}
.gpile{font-size:11px;color:var(--tx3);}

/* ── OPPONENTS ────────────────────────────────────────────────── */
.opparea{display:flex;justify-content:space-around;align-items:center;
  padding:7px 12px;gap:6px;flex-shrink:0;border-bottom:1px solid var(--bd);}
.oppwrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.oppfan{display:flex;justify-content:center;height:28px;}
.oppmini{width:17px;height:26px;background:var(--cbk);border:1px solid var(--bd);
  border-radius:3px;margin-left:-7px;flex-shrink:0;}
.oppmini:first-child{margin-left:0;}
.oppav{width:28px;height:28px;background:var(--bg3);border:1px solid var(--bd);
  border-radius:4px;font-size:11px;color:var(--tx3);display:flex;align-items:center;justify-content:center;}
.oppav.cur{border-color:var(--acc);}
.oppcnt{font-size:10px;color:var(--tx3);}

/* ── TABLE ────────────────────────────────────────────────────── */
.tarea{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.tinner{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;padding:8px;}
.tempty{font-size:11px;color:var(--tx3);letter-spacing:1.5px;}

/* ── HAND ─────────────────────────────────────────────────────── */
.harea{border-top:1px solid var(--bd);padding:7px 10px 10px;flex-shrink:0;}
.hmeta{display:flex;justify-content:space-between;align-items:center;padding:0 3px 6px;font-size:11px;}
.tbadge{color:var(--tx3);padding:3px 7px;border:1px solid transparent;border-radius:4px;
  transition:all .18s;letter-spacing:.5px;}
.tbadge.on{color:var(--acc);border-color:var(--acc);}
.hscroll{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:5px;
  padding:2px 3px 5px;scrollbar-width:none;align-items:flex-end;
  min-height:calc(var(--ch) + 10px);}
.hscroll::-webkit-scrollbar{display:none;}

/* ── CARD ─────────────────────────────────────────────────────── */
.card{
  width:var(--cw);min-width:var(--cw);height:var(--ch);
  background:var(--cfc);border:1px solid var(--bd2);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;flex-shrink:0;cursor:pointer;
  transition:transform .13s,border-color .13s,opacity .13s;
  position:relative;user-select:none;
}
.card .ck{font-size:18px;font-weight:200;color:var(--tx);line-height:1;}
.card .cs{font-size:28px;line-height:1;color:#fff;}
/* Козырь */
.card.tr{border-color:rgba(180,50,50,.4);}
/* Д+ — золотистая */
.card.dp{border-color:rgba(200,180,80,.5);box-shadow:0 0 8px rgba(200,180,80,.1);}
.card.dim{opacity:.28;pointer-events:none;}
.card.sel{transform:translateY(-13px);border-color:var(--acc);}
.card.tcrd{cursor:default;pointer-events:none;animation:deali .2s ease-out;}
@keyframes deali{from{transform:translateY(-12px) scale(.91);opacity:0;}to{transform:none;opacity:1;}}
.card.tr.tcrd{box-shadow:0 0 10px rgba(180,50,50,.15);}
.card.dp.tcrd{box-shadow:0 0 12px rgba(200,180,80,.2);}

/* ── ACTION ROW ───────────────────────────────────────────────── */
.arow{display:flex;gap:7px;padding:5px 3px 2px;}
.abtn{flex:1;padding:11px 6px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--r);color:var(--tx2);font-size:13px;cursor:pointer;text-align:center;transition:all .15s;}
.abtn:active{opacity:.6;}
.abtn.pri{border-color:var(--acc);color:var(--acc);}
.abtn:disabled{opacity:.2;pointer-events:none;}

/* ── FLYING CARD (animation) ──────────────────────────────────── */
.flycard{
  position:fixed;pointer-events:none;z-index:999;
  width:var(--cw);height:var(--ch);
  background:var(--cfc);border:1px solid var(--bd2);border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  will-change:transform,opacity;
}
.flycard .ck{font-size:18px;font-weight:200;color:var(--tx);}
.flycard .cs{font-size:28px;line-height:1;color:#fff;}
.flycard.tr{border-color:rgba(180,50,50,.5);}
.flycard.dp{border-color:rgba(200,180,80,.6);}

/* cover glow on table card */
@keyframes cglow{0%{box-shadow:0 0 0 3px rgba(255,255,255,.35)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.cglow{animation:cglow .45s ease-out;}

/* cards flush to pile */
@keyframes flout{0%{transform:scale(1);opacity:1}40%{transform:scale(1.07)}100%{transform:scale(.3) translateY(-28px);opacity:0}}
.flout{animation:flout .35s ease-in forwards;}

/* Д+ mega flush */
@keyframes megafl{0%{transform:scale(1)}20%{transform:scale(1.14) rotate(-3deg)}45%{transform:scale(1.14) rotate(3deg)}70%{transform:scale(1.06)}100%{transform:scale(.2) translateY(-40px);opacity:0}}
.megafl{animation:megafl .48s ease-in forwards;}

/* pickup */
@keyframes puanim{0%{transform:translateX(0);opacity:1}100%{transform:translateX(55px) scale(.8);opacity:0}}
.puanim{animation:puanim .32s ease-in forwards;}

/* direction flip icon */
@keyframes dirfl{0%{transform:scale(1)}40%{transform:scale(1.5) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}
.dirfl{animation:dirfl .45s ease-out;}

/* ── GAMEOVER ─────────────────────────────────────────────────── */
#sgameover .got{font-size:10px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;}
#sgameover .gor{font-size:64px;font-weight:100;letter-spacing:-4px;margin:10px 0 6px;}
#sgameover .gor.win{color:var(--ok);}
#sgameover .gor.lose{color:var(--err);}
#sgameover .gos{font-size:14px;color:var(--tx2);}

/* ── TOAST ────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--bg4);border:1px solid var(--bd2);color:var(--tx);
  padding:9px 18px;border-radius:var(--r);font-size:13px;z-index:1000;
  opacity:0;transition:opacity .18s;pointer-events:none;
  white-space:nowrap;max-width:92vw;text-align:center;}
.toast.show{opacity:1;}

/* ── OVERLAY: "кто чем крыл" ─────────────────────────────────── */
.cover-overlay{
  position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;pointer-events:none;
  opacity:0;transition:opacity .15s;
}
.cover-overlay.show{opacity:1;}
.cov-row{display:flex;align-items:center;gap:12px;}
.cov-lbl{font-size:11px;color:var(--tx3);letter-spacing:1px;margin-top:6px;text-align:center;}
.cov-arr{font-size:22px;color:var(--tx3);}
/* карточка в оверлее */
.cov-card{
  width:72px;height:100px;background:var(--cfc);border:1px solid var(--bd2);
  border-radius:10px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;
}
.cov-card .ck{font-size:20px;font-weight:200;color:var(--tx);}
.cov-card .cs{font-size:32px;line-height:1;color:#fff;}
.cov-card.tr{border-color:rgba(180,50,50,.5);}
.cov-card.dp{border-color:rgba(200,180,80,.6);}
</style>
</head>
<body>
<div id="app">

<!-- LOBBY -->
<div id="slobby" class="scr on">
  <div class="logo">67</div>
  <div class="logo-s">карточная игра</div>
  <button class="mbtn" onclick="G.search()">Поиск комнаты</button>
</div>

<!-- CONNECTING -->
<div id="sconn" class="scr">
  <div class="spin"></div>
  <div class="clbl" id="clbl">Подключение...</div>
</div>

<!-- ROOM -->
<div id="sroom" class="scr">
  <div class="rh">
    <div class="rh-lbl">Комната</div>
    <div class="rh-id" id="rh-id">—</div>
  </div>
  <div class="pgrid" id="pgrid"></div>
  <div class="rf">
    <div class="rbtn" id="rbtn" onclick="G.toggleReady()">Готов</div>
    <div class="lleave" onclick="G.leave()">Покинуть</div>
  </div>
</div>

<!-- REVEAL -->
<div id="sreveal" class="scr">
  <div class="rvlbl">Первый ход</div>
  <div class="rvwrap">
    <div class="rvcard">
      <div class="rvface rvback"></div>
      <div class="rvface rvfront">
        <div class="rv-rk" id="rv-rk"></div>
        <div class="rv-su" id="rv-su"></div>
      </div>
    </div>
  </div>
  <div class="rvdesc" id="rvdesc"></div>
  <button class="rvbtn" onclick="G.confirmReveal()">Начать игру</button>
</div>

<!-- GAME -->
<div id="sgame">
  <div class="gtop">
    <div class="gturn">Ход: <b id="gwho">—</b></div>
    <div class="gdir" id="gdir">↺</div>
    <div class="gpile" id="gpile"></div>
  </div>
  <div class="opparea" id="opparea"></div>
  <div class="tarea">
    <div class="tinner" id="tinner"><div class="tempty">— стол пуст —</div></div>
  </div>
  <div class="harea">
    <div class="hmeta">
      <div class="tbadge" id="tbadge">Ваш ход</div>
      <div style="font-size:11px;color:var(--tx3)" id="hcnt"></div>
    </div>
    <div class="hscroll" id="hscroll"></div>
    <div class="arow" id="arow"></div>
  </div>
</div>

<!-- GAMEOVER -->
<div id="sgameover" class="scr">
  <div class="got">Игра окончена</div>
  <div class="gor" id="gor"></div>
  <div class="gos" id="gos"></div>
  <button class="mbtn" style="margin-top:36px" onclick="G.toLobby()">В меню</button>
</div>

<!-- COVER OVERLAY -->
<div class="cover-overlay" id="covlay">
  <div class="cov-row" id="cov-row"></div>
  <div class="cov-lbl" id="cov-lbl"></div>
</div>

<button class="tbtn" onclick="G.toggleTheme()">◐</button>
<div class="toast" id="toast"></div>
</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════════════════════
// КОНФИГ — ЗАМЕНИТЕ на ваш Railway URL после деплоя сервера
// ═══════════════════════════════════════════════════════════════════
const WS_URL = window.location.hostname === 'localhost'
  ? 'ws://localhost:3000'
  : 'wss://ВАША_ССЫЛКА.railway.app';  // ← ЗАМЕНИТЕ

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
const RANK_POWER = {'6':0,'В':1,'Д':2,'К':3,'Т':4,'7':5,'8':6};

function isTrump(c){ return c && c.suit==='♚'; }
function isDPlus(c){ return c && c.rank==='Д' && c.suit==='+'; }
function cardCls(c){ return isDPlus(c)?'dp':isTrump(c)?'tr':''; }

// Клиентская копия правил (для подсветки playable карт)
function canCoverClient(att, def){
  if(!att) return true;                             // стол пуст — любая карта
  if(isDPlus(def)) return true;                     // Д+ бьёт всё
  if(att.rank==='7' && def.rank==='6') return false;// 7 нельзя перебить шестёркой
  if(att.suit==='+'){                               // масть + кроется только мастью +
    return def.suit==='+'&&RANK_POWER[def.rank]>RANK_POWER[att.rank];
  }
  if(def.rank==='6'){
    if(att.suit==='+') return false;
    if(att.rank==='7') return false;
    if(def.suit==='♚') return true;                // 6♚ бьёт любую не-+ не-7
    return def.suit===att.suit;
  }
  if(att.suit==='♚'){                              // козырь кроется козырем
    return def.suit==='♚'&&RANK_POWER[def.rank]>RANK_POWER[att.rank];
  }
  if(def.suit===att.suit) return RANK_POWER[def.rank]>RANK_POWER[att.rank];
  if(def.suit==='♚') return true;                  // козырь бьёт обычную масть
  return false;
}

function cardHTML(c, extra=''){
  if(!c) return `<div class="card ${extra}" style="background:var(--cbk);pointer-events:none;cursor:default;"></div>`;
  return `<div class="card ${cardCls(c)} ${extra}"><div class="ck">${c.rank}</div><div class="cs">${c.suit}</div></div>`;
}

let _toastT;
function toast(msg,ms=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),ms);
}

function showScr(id){
  document.querySelectorAll('.scr,#sgame').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ═══════════════════════════════════════════════════════════════════
// COVER OVERLAY — показывает «чем крыли»
// ═══════════════════════════════════════════════════════════════════
let _covT;
function showCoverOverlay(attCard, defCard, label){
  const lay = document.getElementById('covlay');
  const row = document.getElementById('cov-row');
  const lbl = document.getElementById('cov-lbl');

  function miniCard(c){
    if(!c) return '';
    return `<div class="cov-card ${cardCls(c)}"><div class="ck">${c.rank}</div><div class="cs">${c.suit}</div></div>`;
  }

  if(attCard){
    row.innerHTML = miniCard(attCard) + `<div class="cov-arr">→</div>` + miniCard(defCard);
  } else {
    row.innerHTML = miniCard(defCard);
  }
  lbl.textContent = label || '';

  lay.classList.add('show');
  clearTimeout(_covT);
  _covT = setTimeout(()=>lay.classList.remove('show'), 1600);
}

// ═══════════════════════════════════════════════════════════════════
// MAIN GAME OBJECT
// ═══════════════════════════════════════════════════════════════════
const G = {
  ws: null,
  st: null,          // текущий game_state от сервера
  myIdx: -1,
  sel: null,         // индекс выбранной карты в руке
  isReady: false,
  isDark: true,
  userId: null,
  userName: null,

  // ── INIT ──────────────────────────────────────────────────────
  init(){
    const twa = window.Telegram?.WebApp;
    if(twa){
      twa.expand(); twa.ready();
      const u = twa.initDataUnsafe?.user;
      this.userId   = String(u?.id ?? Math.random().toString(36).slice(2));
      this.userName = u?.first_name ?? 'Игрок';
      twa.setHeaderColor('#0e0e0e');
      twa.setBackgroundColor('#0e0e0e');
    } else {
      this.userId   = 'u'+Math.random().toString(36).slice(2,8);
      this.userName = 'Игрок';
    }
  },

  toggleTheme(){
    this.isDark=!this.isDark;
    document.documentElement.setAttribute('data-theme', this.isDark?'dark':'light');
  },

  // ── WS ────────────────────────────────────────────────────────
  setStatus(txt){
    const el = document.getElementById('clbl');
    if(el) el.textContent = txt;
    console.log('[67]', txt);
  },

  connect(cb){
    if(this.ws){ try{this.ws.close();}catch(e){} this.ws=null; }
    showScr('sconn');
    this.setStatus('Подключение к серверу...');

    let ws;
    try {
      ws = new WebSocket(WS_URL);
    } catch(e) {
      this.setStatus('Ошибка: ' + e.message);
      setTimeout(()=>showScr('slobby'), 2500);
      return;
    }
    this.ws = ws;

    // Таймаут — если за 8 секунд нет onopen, показываем ошибку
    const connTimer = setTimeout(()=>{
      if(ws.readyState !== 1){
        this.setStatus('Нет ответа от сервера (таймаут)');
        try{ws.close();}catch(e){}
        setTimeout(()=>showScr('slobby'), 2500);
      }
    }, 8000);

    ws.onopen = ()=>{
      clearTimeout(connTimer);
      this.setStatus('Соединение установлено');
      cb(ws);
    };

    ws.onmessage = e=>{
      try{ this.onMsg(JSON.parse(e.data)); }
      catch(err){ console.error('[67] parse error', err); }
    };

    ws.onerror = (e)=>{
      clearTimeout(connTimer);
      this.setStatus('Ошибка соединения — проверьте интернет');
      console.error('[67] WS error', e);
      setTimeout(()=>showScr('slobby'), 2500);
    };

    ws.onclose = (e)=>{
      clearTimeout(connTimer);
      console.log('[67] WS closed code='+e.code+' reason='+e.reason);
      if(this.st?.phase==='playing') toast('Соединение потеряно');
    };
  },

  send(obj){
    if(this.ws?.readyState===1){
      this.ws.send(JSON.stringify(obj));
    } else {
      console.warn('[67] send skipped, ws state=', this.ws?.readyState);
    }
  },

  // ── MESSAGES ──────────────────────────────────────────────────
  onMsg(m){
    switch(m.type){

      case 'joined':
        this.myIdx = m.yourIndex;
        document.getElementById('rh-id').textContent = m.roomId;
        showScr('sroom');
        break;

      case 'room_update':
        this.myIdx = m.yourIndex;   // обновляем на случай реконнекта
        this.renderRoom(m.players);
        break;

      case 'game_state':
        this.myIdx = m.myIndex;
        this.st = m;
        if(m.phase==='reveal')    this.showReveal();
        else if(m.phase==='playing')  this.renderGame();
        else if(m.phase==='gameover') this.showGameOver();
        break;

      case 'game_event':
        this.handleEvent(m.event);
        break;

      case 'error':
        toast(m.reason);
        break;

      case 'player_left':
        toast('Игрок покинул игру');
        break;
    }
  },

  // ── LOBBY / SEARCH ────────────────────────────────────────────
  search(){
    this.connect(ws=>{
      this.setStatus('Поиск комнаты...');
      ws.send(JSON.stringify({type:'join', userId:this.userId, name:this.userName}));
    });
  },

  // ── ROOM ──────────────────────────────────────────────────────
  renderRoom(players){
    let html='';
    for(let i=0;i<4;i++){
      const p=players[i];
      if(p){
        html+=`<div class="pslot${p.ready?' rdy':''}">
          <div class="pav"></div>
          <div class="pst">${p.ready?'Готов':'Не готов'}</div>
        </div>`;
      } else {
        html+=`<div class="pslot emp"><div class="pav"></div><div class="pst">Ожидание</div></div>`;
      }
    }
    document.getElementById('pgrid').innerHTML=html;
  },

  toggleReady(){
    this.isReady=!this.isReady;
    const b=document.getElementById('rbtn');
    b.textContent=this.isReady?'Не готов':'Готов';
    b.classList.toggle('on',this.isReady);
    this.send({type:'ready', isReady:this.isReady});
  },

  leave(){
    this.isReady=false;
    if(this.ws){this.ws.close();this.ws=null;}
    showScr('slobby');
  },

  toLobby(){
    this.st=null; this.sel=null; this.isReady=false;
    if(this.ws){this.ws.close();this.ws=null;}
    showScr('slobby');
  },

  // ── REVEAL ────────────────────────────────────────────────────
  showReveal(){
    const s=this.st;
    const rc=s.revealCard;
    document.getElementById('rv-rk').textContent=rc.rank;
    document.getElementById('rv-su').textContent=rc.suit;
    const isMe=s.firstPlayer===this.myIdx;
    document.getElementById('rvdesc').textContent=
      isMe?'Вы ходите первым!':`${s.players[s.firstPlayer]?.name??'Оппонент'} ходит первым`;
    showScr('sreveal');
  },

  confirmReveal(){
    this.send({type:'reveal_done'});
    // Сервер пришлёт game_state с phase=playing — тогда и покажем игру
  },

  // ── EVENT HANDLER (анимации) ──────────────────────────────────
  handleEvent(ev){
    if(ev.type==='play'){
      // Показываем оверлей «чем крыли»
      const def = ev.card;                     // карта которую бросили
      const att = ev.tableTopWas || null;      // карта которую крыли (null = первый ход)
      const isMine = ev.playerIdx===this.myIdx;

      if(att){
        // Есть что крыть — показываем att → def
        let lbl = '';
        if(isDPlus(def)) lbl='Д+ — бьёт всё!';
        else if(def.rank==='8') lbl='8 — переворот, право хода бросившему';
        else if(def.rank==='6') lbl='6 — переворот направления';
        else lbl=isMine?'Вы покрыли':'Оппонент покрыл';
        showCoverOverlay(att, def, lbl);
      } else {
        // Первый ход — просто показываем карту
        showCoverOverlay(null, def, isMine?'Ваш ход':'Ход оппонента');
      }

      // Анимируем карту летящую на стол
      this._animFly(ev, isMine);

      // Анимируем сброс в биту
      if(ev.effect?.beatAll || ev.flushed){
        const cls = ev.effect?.beatAll?'megafl':'flout';
        setTimeout(()=>{
          document.querySelectorAll('#tinner .card').forEach(c=>c.classList.add(cls));
        }, 310);
      }
      // Анимируем переворот стрелки
      if(ev.effect?.flip){
        setTimeout(()=>this._animDir(), 380);
      }

    } else if(ev.type==='pickup'){
      setTimeout(()=>{
        document.querySelectorAll('#tinner .card').forEach(c=>c.classList.add('puanim'));
      }, 80);
    }
  },

  _animFly(ev, isMine){
    const card=ev.card;
    const cw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cw'))||62;
    const ch=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ch'))||88;
    const tarea=document.querySelector('.tarea');
    const tr=tarea?tarea.getBoundingClientRect():{left:window.innerWidth/2-31,top:window.innerHeight/2-44,width:62,height:88};
    const dx=tr.left+tr.width/2-cw/2;
    const dy=tr.top+tr.height/2-ch/2;

    let sx,sy;
    if(isMine && this.sel!==null){
      const cards=document.querySelectorAll('#hscroll .card');
      const el=cards[this.sel];
      if(el){ const r=el.getBoundingClientRect(); sx=r.left; sy=r.top; }
      else { sx=dx; sy=window.innerHeight; }
    } else {
      // Оппонент — летит сверху
      sx=dx; sy=ev.playerIdx<this.myIdx?-ch:window.innerHeight+ch;
    }

    const fly=document.createElement('div');
    fly.className=`flycard ${cardCls(card)}`;
    fly.innerHTML=`<div class="ck">${card.rank}</div><div class="cs">${card.suit}</div>`;
    fly.style.cssText=`left:${sx}px;top:${sy}px;`;
    document.body.appendChild(fly);

    requestAnimationFrame(()=>{
      fly.style.transition=`transform .27s cubic-bezier(.2,0,.2,1)`;
      fly.style.transform=`translate(${dx-sx}px,${dy-sy}px)`;
      setTimeout(()=>{
        fly.remove();
        // Подсветка верхней карты на столе
        if(ev.tableTopWas && !ev.effect?.beatAll && !ev.flushed){
          const tcs=document.querySelectorAll('#tinner .card');
          if(tcs.length>0) tcs[tcs.length-1].classList.add('cglow');
        }
        this.sel=null;
      }, 300);
    });
  },

  _animDir(){
    const el=document.getElementById('gdir');
    el.classList.remove('dirfl'); void el.offsetWidth;
    el.classList.add('dirfl');
    el.addEventListener('animationend',()=>el.classList.remove('dirfl'),{once:true});
  },

  // ── GAME RENDER ───────────────────────────────────────────────
  renderGame(){
    const s=this.st; if(!s) return;
    showScr('sgame');

    const isMe=s.currentPlayer===this.myIdx;
    document.getElementById('gwho').textContent=isMe?'Вы':s.players[s.currentPlayer]?.name??'?';
    document.getElementById('gdir').textContent=s.direction===-1?'↺':'↻';
    document.getElementById('gpile').textContent=s.pile>0?`Бита: ${s.pile}`:'';
    document.getElementById('tbadge').classList.toggle('on',isMe);

    this._renderOpps();
    this._renderTable();
    this._renderHand();
    this._renderActions();
  },

  _renderOpps(){
    const s=this.st;
    const others=s.players.map((p,i)=>({...p,i})).filter(p=>p.i!==this.myIdx);
    document.getElementById('opparea').innerHTML=others.map(p=>{
      const hand=s.hands[p.i];
      const cnt=(hand||[]).filter(Boolean).length;
      const isCur=s.currentPlayer===p.i;
      const fans=Array.from({length:Math.min(cnt,12)},()=>`<div class="oppmini"></div>`).join('');
      return `<div class="oppwrap">
        <div class="oppcnt">${cnt}</div>
        <div class="oppfan">${fans}</div>
        <div class="oppav${isCur?' cur':''}">${(p.name||'?')[0]}</div>
      </div>`;
    }).join('');
  },

  _renderTable(){
    const s=this.st;
    const ti=document.getElementById('tinner');
    if(!s.table||s.table.length===0){
      ti.innerHTML='<div class="tempty">— стол пуст —</div>'; return;
    }
    ti.innerHTML=s.table.map(c=>
      `<div class="card tcrd ${cardCls(c)}"><div class="ck">${c.rank}</div><div class="cs">${c.suit}</div></div>`
    ).join('');
  },

  _renderHand(){
    const s=this.st;
    const hand=s.hands[this.myIdx]||[];
    const isMyTurn=s.currentPlayer===this.myIdx;
    const att=s.table?.length>0?s.table[s.table.length-1]:null;
    document.getElementById('hscroll').innerHTML=hand.map((c,i)=>{
      if(!c) return '';
      let ex='';
      if(isMyTurn){ if(!canCoverClient(att,c)) ex='dim'; }
      const sel=this.sel===i?'sel':'';
      return `<div class="card ${cardCls(c)} ${ex} ${sel}" onclick="G.selCard(${i})">
        <div class="ck">${c.rank}</div><div class="cs">${c.suit}</div>
      </div>`;
    }).join('');
    document.getElementById('hcnt').textContent=`${hand.filter(Boolean).length} карт`;
  },

  _renderActions(){
    const s=this.st;
    const isMe=s.currentPlayer===this.myIdx;
    const row=document.getElementById('arow');
    if(!isMe){ row.innerHTML=''; return; }
    const canPlay=this.sel!==null;
    const canPick=s.table?.length>0;
    row.innerHTML=`
      <button class="abtn${canPlay?' pri':''}" ${canPlay?'':'disabled'} onclick="G.doPlay()">Сыграть</button>
      ${canPick?`<button class="abtn" onclick="G.doPickup()">Поднять</button>`:''}`;
  },

  selCard(i){
    if(!this.st||this.st.currentPlayer!==this.myIdx) return;
    this.sel=this.sel===i?null:i;
    this._renderHand(); this._renderActions();
  },

  doPlay(){
    if(this.sel===null) return;
    this.send({type:'play', cardIndex:this.sel});
    // Анимация придёт из game_event, обновление стейта — из game_state
  },

  doPickup(){
    this.send({type:'pickup'});
  },

  // ── GAMEOVER ──────────────────────────────────────────────────
  showGameOver(){
    const s=this.st;
    showScr('sgameover');
    const r=document.getElementById('gor');
    const sub=document.getElementById('gos');
    if(s.loser===null){
      r.textContent='Ничья'; r.className='gor';  sub.textContent='';
    } else if(s.loser===this.myIdx){
      r.textContent='Поражение'; r.className='gor lose';
      sub.textContent=`Осталось ${(s.hands[this.myIdx]||[]).filter(Boolean).length} карт`;
    } else {
      r.textContent='Победа'; r.className='gor win';
      sub.textContent=`${s.players[s.loser]?.name??'Оппонент'} остался с картами`;
    }
  },
};

G.init();
</script>
</body>
</html>
